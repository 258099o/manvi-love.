<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Manvi</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    overflow: hidden;
    font-family: 'Poppins', sans-serif;
    background: black;
    color: white;
}

/* Background Image */
.bg {
    position: fixed;
    width: 100%;
    height: 100%;
    background: url("1741153221369.jpg") center/cover no-repeat;
    filter: blur(8px) brightness(0.5);
    transform: scale(1.1);
    animation: zoom 20s infinite alternate ease-in-out;
}

@keyframes zoom {
    from { transform: scale(1.1); }
    to { transform: scale(1.2); }
}

/* Overlay */
.overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background: linear-gradient(to bottom, rgba(0,0,0,0.7), rgba(0,0,0,0.95));
}

/* Center Card */
.container {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    width: 90%;
    max-width: 700px;
    backdrop-filter: blur(15px);
    background: rgba(255,255,255,0.05);
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 0 40px rgba(255,255,255,0.1);
    opacity: 0;
    animation: fadeIn 3s forwards 2s;
}

@keyframes fadeIn {
    to { opacity: 1; }
}

h1 {
    font-family: 'Playfair Display', serif;
    font-size: 38px;
    margin-bottom: 20px;
}

p {
    font-size: 18px;
    line-height: 1.8;
    opacity: 0.9;
}

/* Button */
button {
    margin-top: 30px;
    padding: 12px 30px;
    font-size: 16px;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    background: white;
    color: black;
    transition: 0.4s;
}

button:hover {
    background: black;
    color: white;
    border: 1px solid white;
}

/* Proposal Section */
.proposal {
    margin-top: 30px;
    font-size: 24px;
    display: none;
    font-family: 'Playfair Display', serif;
}

.yes-btn {
    margin-top: 20px;
    background: #ffffff;
}

.no-btn {
    position: relative;
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<audio id="music" loop>
    <source src="Hua_Hain_Aaj_Pehli_Baar.mp3" type="audio/mp3">
</audio>

<div class="container">
    <h1>Manvi</h1>
    <p id="text">
        Some people enter your life quietly...
        and without warning,
        they become your entire world.
        <br><br>
        You did not just walk into my life.
        You changed it.
    </p>

    <button onclick="start()">Begin</button>

    <div class="proposal" id="proposal">
        Will you be my forever?
        <br>
        <button class="yes-btn">Yes</button>
        <button class="no-btn" onmouseover="moveButton(this)">No</button>
    </div>
</div>

<script>
function start() {
    document.getElementById("music").play();
    setTimeout(() => {
        document.getElementById("proposal").style.display = "block";
    }, 4000);
}

function moveButton(button) {
    button.style.position = "absolute";
    button.style.top = Math.random() * 300 + "px";
    button.style.left = Math.random() * 300 + "px";
}
</script>

</body>
</html>
