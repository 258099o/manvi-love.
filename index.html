<script>

setTimeout(()=>{
document.getElementById("intro").style.display="none";
document.getElementById("password").style.display="flex";
},4000);

function unlock(){
if(document.getElementById("pass").value==="143"){
document.getElementById("password").style.display="none";
document.getElementById("page1").style.display="flex";
document.getElementById("music").play();
}else{
document.body.style.background="darkred";
setTimeout(()=>document.body.style.background="black",300);
}
}

function toPhoto(){
document.getElementById("page1").style.display="none";
document.getElementById("page2").style.display="flex";
createLights();
simulateKiss();
}

function createLights(){
for(let i=0;i<40;i++){
let l=document.createElement("div");
l.className="light";
l.style.left=Math.random()*100+"vw";
l.style.animationDuration=(5+Math.random()*5)+"s";
document.body.appendChild(l);
}
}

function simulateKiss(){

// glow near lips (center area)
let glow=document.createElement("div");
glow.style.position="absolute";
glow.style.width="120px";
glow.style.height="120px";
glow.style.borderRadius="50%";
glow.style.background="radial-gradient(circle, rgba(255,180,120,0.9), transparent 70%)";
glow.style.top="48%";
glow.style.left="50%";
glow.style.transform="translate(-50%,-50%)";
glow.style.zIndex="5";
glow.style.opacity="0";
glow.style.transition="1s";
document.body.appendChild(glow);

setTimeout(()=>{ glow.style.opacity="1"; },500);

// golden particle
setTimeout(()=>{
let particle=document.createElement("div");
particle.style.position="absolute";
particle.style.width="20px";
particle.style.height="20px";
particle.style.borderRadius="50%";
particle.style.background="gold";
particle.style.top="50%";
particle.style.left="50%";
particle.style.transform="translate(-50%,-50%)";
particle.style.transition="2s ease-out";
particle.style.zIndex="6";
document.body.appendChild(particle);

setTimeout(()=>{
particle.style.transform="translate(-50%,-300%) scale(6)";
particle.style.opacity="0";
},100);

setTimeout(()=>{
particle.remove();
glow.remove();
},2200);

},1500);

}

function moveNo(btn){
btn.style.left=Math.random()*200+"px";
btn.style.top=Math.random()*200+"px";
}

function yes(){
document.body.innerHTML+="<div class='secret'>Forever starts now, Manvi.<br>- Dev</div>";
fireworks();
}

function fireworks(){
for(let i=0;i<80;i++){
let f=document.createElement("div");
f.className="firework";
f.style.left="50%";
f.style.top="50%";
f.style.setProperty('--x',(Math.random()*500-250)+"px");
f.style.setProperty('--y',(Math.random()*500-250)+"px");
document.body.appendChild(f);
setTimeout(()=>f.remove(),1000);
}
}

</script>
